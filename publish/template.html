<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
:root {
{{THEME_VARS}}
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px 100px;
}
header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 32px;
  margin-bottom: 48px;
}
header .badges {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.badge {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--fg-muted);
}
.badge.pass { color: var(--pass); border-color: rgba(34, 197, 94, 0.3); }
.badge.fail { color: var(--fail); border-color: rgba(239, 68, 68, 0.3); }
.badge.warn { color: var(--warn); border-color: rgba(245, 158, 11, 0.3); }
h1 { font-size: 38px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; }
h1 .subtitle { display: block; font-size: 18px; font-weight: 400; color: var(--fg-muted); margin-top: 6px; }
h2 {
  font-size: 28px;
  font-weight: 700;
  margin: 56px 0 20px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  scroll-margin-top: 20px;
}
h2::before { content: ''; display: block; height: 24px; margin-top: -24px; }
h3 { font-size: 21px; font-weight: 600; margin: 36px 0 14px; color: var(--accent); }
h4 { font-size: 16px; font-weight: 600; margin: 24px 0 10px; color: var(--fg); text-transform: uppercase; letter-spacing: 0.05em; }
p { margin: 14px 0; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
code {
  font-family: "SF Mono", Monaco, "Cascadia Mono", "Roboto Mono", monospace;
  font-size: 13px;
  background: var(--inline-code-bg);
  color: var(--inline-code-fg);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--inline-code-border);
}
pre {
  background: var(--bg-code);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
  overflow-x: auto;
  font-family: "SF Mono", Monaco, "Cascadia Mono", "Roboto Mono", monospace;
  font-size: 13px;
  line-height: 1.55;
}
pre code { background: none; border: none; color: var(--fg); padding: 0; font-size: 13px; }
table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  font-size: 14px;
  background: var(--bg-card);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
th, td {
  text-align: left;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
th {
  background: var(--th-bg);
  color: var(--fg);
  font-weight: 600;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
tr:last-child td { border-bottom: none; }
td.pass { color: var(--pass); font-weight: 600; }
td.fail { color: var(--fail); font-weight: 600; }
td.warn { color: var(--warn); font-weight: 600; }
td.na { color: var(--na); font-style: italic; }
blockquote {
  border-left: 3px solid var(--accent);
  padding: 12px 20px;
  margin: 20px 0;
  background: var(--quote-bg);
  border-radius: 0 8px 8px 0;
  color: var(--fg);
}
blockquote p { margin: 6px 0; }
hr { border: 0; border-top: 1px solid var(--border); margin: 32px 0; }
ul, ol { padding-left: 28px; }
li { margin: 6px 0; }
nav.toc {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 32px;
  font-size: 14px;
}
nav.toc .toc-title { font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; }
nav.toc > .toc > ul { list-style: none; padding-left: 0; margin: 0; }
nav.toc ul ul { padding-left: 20px; }
nav.toc a { color: var(--fg); }
nav.toc a:hover { color: var(--accent); }
nav.toc li { margin: 4px 0; }
.site-footer { margin-top: 80px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--fg-muted); font-size: 13px; }
.site-footer a { color: var(--fg-muted); }
.site-home { display: inline-block; margin-bottom: 24px; font-size: 13px; color: var(--fg-muted); }
</style>
<style>
/* Pygments codehilite (default style) */
{{CODEHILITE_CSS}}
</style>
</head>
<body>
<div class="container">
  <a class="site-home" href="./">← lance-docs 首页</a>
  <header>
    <div class="badges">{{BADGES}}</div>
    <h1>{{H1_TITLE}}{{H1_SUBTITLE}}</h1>
  </header>
  <nav class="toc">
    <div class="toc-title">目录</div>
    {{TOC}}
  </nav>
  <main>
{{CONTENT}}
  </main>
  <footer class="site-footer">
    源文档：<code>{{SOURCE_NAME}}</code> · 渲染时间：{{RENDER_DATE}}{{RELATED_LINK}}
  </footer>
</div>
</body>
</html>
